<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Very Important Question ❤️</title>
    <meta name="description" content="A very important question for a very special person.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="note-container" id="noteContainer">
            <img src="paper.png" alt="Note" class="paper-bg" id="paperBg">

            <div class="note-content" id="noteContent">
                <h1 class="main-question" id="mainQuestion">Do you want to be my girlfriend?</h1>
                <p class="sub-text" id="subText">just try and say no</p>

                <div class="checkbox-area" id="checkboxArea">
                    <label class="checkbox-option yes-option" id="yesOption">
                        <span class="custom-checkbox" id="yesCheckbox"></span>
                        <span class="checkbox-label">Yes</span>
                    </label>
                    <label class="checkbox-option no-option" id="noOption">
                        <span class="custom-checkbox" id="noCheckbox"></span>
                        <span class="checkbox-label">No</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Celebration overlay -->
        <div class="celebration-overlay" id="celebrationOverlay">
            <div class="celebration-content">
                <h2 class="celebration-text" id="celebrationText">I knew it! ❤️</h2>
                <div class="hearts-container" id="heartsContainer"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
